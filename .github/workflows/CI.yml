on:
  push:
    branches:
      - '*'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-node@v3
      with:
        node-version: '18'
    - run: npm install
    - name: Run tests
      continue-on-error: true
      uses: GabrielBB/xvfb-action@v1.4
      with:
        run: npm test
    - run: npm run package
    - uses: actions/upload-artifact@v3
      with:
        name: VSIX
        path: '*.vsix'
